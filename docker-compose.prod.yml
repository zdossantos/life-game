# Production / VPS deployment
#
# Prerequisites:
#   1. Build the image:  docker compose -f docker-compose.prod.yml build
#   2. Create .env from .env.example and fill in APP_KEY, APP_URL, etc.
#      (run "php artisan key:generate --show" locally or inside the container
#       to get a key)
#   3. Start:            docker compose -f docker-compose.prod.yml up -d
#
# The application is served on port 80.
# Put a reverse proxy (Caddy / Nginx / Traefik) in front for HTTPS.

services:
  # ── App (nginx + php-fpm) ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: life-game:latest
    ports:
      - "80:80"
    volumes:
      # Persist the SQLite database and uploaded files across container restarts
      - sqlite-data:/var/www/html/database
      - storage-data:/var/www/html/storage
    env_file:
      - .env
    restart: unless-stopped

  # ── Queue worker ───────────────────────────────────────────────────────────
  queue:
    image: life-game:latest
    volumes:
      - sqlite-data:/var/www/html/database
      - storage-data:/var/www/html/storage
    env_file:
      - .env
    # Override entrypoint: skip web server setup, only run the queue
    entrypoint: []
    command: sh -c "php artisan queue:work --tries=3 --sleep=3 --timeout=60"
    restart: unless-stopped
    depends_on:
      - app

volumes:
  sqlite-data:
  storage-data:
