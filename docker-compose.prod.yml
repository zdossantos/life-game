name: life-game

# ─── Production (VPS) ─────────────────────────────────────────────────────────
# Usage:
#   cp .env.example .env
#   # Edit .env: set APP_KEY, APP_URL, APP_DEBUG=false, APP_ENV=production
#   docker compose -f docker-compose.prod.yml up -d --build
#
# App: http://<your-vps-ip>  (port 80)
# ─────────────────────────────────────────────────────────────────────────────

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      # Persist the SQLite database and user-uploaded files across deploys
      - sqlite_data:/var/www/html/database
      - storage:/var/www/html/storage/app
    environment:
      APP_NAME: "${APP_NAME:-Life Game}"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: "${APP_KEY}"
      APP_URL: "${APP_URL:-http://localhost}"
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stderr
      LOG_LEVEL: warning

  # ── Optional: switch to MySQL instead of SQLite ───────────────────────────
  # Uncomment the mysql service below and update the app environment variables:
  #   DB_CONNECTION: mysql
  #   DB_HOST: mysql
  #   DB_PORT: 3306
  #   DB_DATABASE: life_game
  #   DB_USERNAME: laravel
  #   DB_PASSWORD: "${DB_PASSWORD}"
  #
  # mysql:
  #   image: mysql:8.4
  #   restart: unless-stopped
  #   environment:
  #     MYSQL_DATABASE: life_game
  #     MYSQL_USER: laravel
  #     MYSQL_PASSWORD: "${DB_PASSWORD}"
  #     MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
  #   volumes:
  #     - mysql_data:/var/lib/mysql

volumes:
  sqlite_data:
  storage:
  # mysql_data:
