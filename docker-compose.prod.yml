name: life-game

# ─── Production – Coolify v4 ──────────────────────────────────────────────────
#
# POINT D'ENTRÉE HTTP :
#   Service : app
#   Port interne : 80
#   → Configurer ce port dans l'interface Coolify pour que Traefik route
#     le trafic HTTPS vers ce service.
#
# VARIABLES À DÉFINIR DANS COOLIFY (Settings → Environment Variables) :
#   APP_KEY          – Clé de chiffrement Laravel (php artisan key:generate)
#   APP_NAME         – Nom affiché de l'application (défaut : "Life Game")
#   APP_URL          – URL publique complète (ex: https://lifegame.example.com)
#   DB_PASSWORD      – Mot de passe de l'utilisateur MySQL "laravel"
#   DB_ROOT_PASSWORD – Mot de passe root MySQL
#
# ─────────────────────────────────────────────────────────────────────────────

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: life_game
      MYSQL_USER: laravel
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - storage:/var/www/html/storage/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    environment:
      APP_NAME: "${APP_NAME:-Life Game}"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: "${APP_KEY}"
      APP_URL: "${APP_URL:-http://localhost}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: life_game
      DB_USERNAME: laravel
      DB_PASSWORD: "${DB_PASSWORD}"
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stderr
      LOG_LEVEL: warning
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  storage:
