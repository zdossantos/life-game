; OPcache — recommended settings for production
; NOTE: with validate_timestamps=0 PHP will not pick up file changes automatically.
;       After deploying new code, restart the container (docker compose restart app).
opcache.enable=1
opcache.memory_consumption=256
opcache.max_accelerated_files=20000
opcache.revalidate_freq=0
opcache.validate_timestamps=0
opcache.interned_strings_buffer=16

; Upload / memory limits
upload_max_filesize=50M
post_max_size=50M
memory_limit=256M
max_execution_time=60
