name: life-game

# ─── Local development ────────────────────────────────────────────────────────
# Usage:
#   cp .env.example .env      # first time only
#   docker compose up --build
#
# App:  http://localhost:8000
# Vite: http://localhost:5173  (HMR active)
# DB:   mysql://root@127.0.0.1:3306/life_game
# ─────────────────────────────────────────────────────────────────────────────

services:
  # MySQL database
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: life_game
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PHP / Laravel dev server
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - .:/var/www/html
      # Named volumes keep vendor/ and node_modules/ inside the container
      # so host OS / architecture differences don't cause issues.
      - vendor:/var/www/html/vendor
    env_file: .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: life_game
      DB_USERNAME: root
      DB_PASSWORD: ""
    depends_on:
      mysql:
        condition: service_healthy

  # Vite dev server (HMR)
  vite:
    image: node:22-alpine
    working_dir: /var/www/html
    # --host makes Vite listen on 0.0.0.0 so it is reachable from the host
    command: sh -c "if [ -z \"$(ls -A /var/www/html/node_modules 2>/dev/null)\" ]; then npm ci; fi && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html
      - node_modules:/var/www/html/node_modules

volumes:
  vendor:
  node_modules:
  mysql_data:
